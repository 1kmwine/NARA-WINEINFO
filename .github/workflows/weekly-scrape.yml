name: Weekly Wine Scraper

on:
  schedule:
    # 매주 일요일 02:00 KST = 토요일 17:00 UTC
    - cron: "0 17 * * 6"
  workflow_dispatch:
    inputs:
      slug:
        description: "특정 와인 슬러그 (비워두면 전체 실행)"
        required: false
        type: string
      batch_size:
        description: "배치 크기 (기본 50)"
        required: false
        default: "50"
        type: number

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/scraper/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -q -r scripts/scraper/requirements.txt

      - name: Run scraper (all wines)
        if: ${{ !inputs.slug }}
        env:
          BATCH_SIZE: ${{ inputs.batch_size || 50 }}
        run: |
          cd scripts/scraper
          python main.py --all --batch-size "$BATCH_SIZE"

      - name: Run scraper (single wine)
        if: ${{ inputs.slug }}
        env:
          WINE_SLUG: ${{ inputs.slug }}
        run: |
          cd scripts/scraper
          python main.py --slug "$WINE_SLUG"
